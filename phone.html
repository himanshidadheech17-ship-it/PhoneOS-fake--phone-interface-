<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phone</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="phone-frame">
    <div class="phone-screen">
      <div class="notch"></div>

      <div class="app-header">
        <a class="back-btn" href="index.html">&#8592;</a>
        <span class="app-title">Calls</span>
      </div>

      <div class="app-body">
        <div class="settings-section-label">Recents</div>
        <div class="recent-calls">
          <div class="call-row">
            <div>
              <div class="call-name">Mumma</div>
              <div class="call-info">Mobile &middot;  7 mins</div>
            </div>
            <span>9:02 AM</span>
          </div>
          <div class="call-row">
            <div>
              <div class="call-name">ABC Sir GWECA</div>
              <div class="call-info">Mobile &middot; Missed</div>
            </div>
            <span>Yesterday</span>
          </div>
          <div class="call-row">
            <div>
              <div class="call-name">School Friend</div>
              <div class="call-info">Mobile &middot; 45 min</div>
            </div>
            <span>Yesterday</span>
          </div>
        </div>
      </div>

      <div class="dial-pad">
        <span class="dial-btn">1</span>
        <span class="dial-btn">2</span>
        <span class="dial-btn">3</span>
        <span class="dial-btn">4</span>
        <span class="dial-btn">5</span>
        <span class="dial-btn">6</span>
        <span class="dial-btn">7</span>
        <span class="dial-btn">8</span>
        <span class="dial-btn">9</span>
        <span class="dial-btn">*</span>
        <span class="dial-btn">0</span>
        <span class="dial-btn">#</span>
      </div>
      <div style="padding-bottom: 26px;">
        <span class="call-btn">&#128222;</span>
      </div>
    </div>
  </div>
</body>
</html>

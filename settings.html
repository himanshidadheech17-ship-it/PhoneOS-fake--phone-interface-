<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="phone-frame">
    <div class="phone-screen">
      <div class="notch"></div>

      <div class="app-header">
        <a class="back-btn" href="index.html">&#8592;</a>
        <span class="app-title">Settings</span>
      </div>

      <div class="app-body">
        <div class="profile-card">
          <div class="profile-avatar"></div>
          <div>
            <div class="profile-name">Himanshi</div>
            <div class="profile-sub">Aspiring Data Scientist</div>
          </div>
        </div>

        <div class="settings-section-label">Display</div>
        <div class="settings-list">
          <div class="settings-row">
            <span>&#127769; Dark Mode</span>
            <input type="checkbox" id="darkToggle" class="toggle-input" />
            <label for="darkToggle" class="toggle-label"></label>
          </div>
          <div class="settings-row">
            <span>&#128276; Notifications</span>
            <input type="checkbox" id="notifToggle" class="toggle-input" checked />
            <label for="notifToggle" class="toggle-label"></label>
          </div>
        </div>

        <div class="settings-section-label">About</div>
        <div class="settings-list">
          <div class="settings-row">
            <span>&#128241; Project</span>
            <span style="color:var(--ink-dim); font-size:12.5px;">PhoneOS</span>
          </div>
          <div class="settings-row">
            <span>&#9889; Built with</span>
            <span style="color:var(--ink-dim); font-size:12.5px;">HTML &amp; CSS </span>
          </div>
        </div>

        <div class="about-links">
          <a href="https://github.com/" target="_blank" rel="noopener">GitHub</a>
          <a href="https://www.linkedin.com/in/himanshi-dadheech-496593338 " target="_blank" rel="noopener">LinkedIn</a>
        </div>
      </div>
    </div>
  </div>
</body>
</html>

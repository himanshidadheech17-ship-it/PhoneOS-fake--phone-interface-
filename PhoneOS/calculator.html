<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="phone-frame">
    <div class="phone-screen">
      <div class="notch"></div>

      <div class="app-header">
        <a class="back-btn" href="index.html">&#8592;</a>
        <span class="app-title">Calculator</span>
      </div>

      <div class="calc-display">0</div>

      <div class="calc-pad">
        <span class="calc-btn">AC</span>
        <span class="calc-btn">+/&minus;</span>
        <span class="calc-btn">%</span>
        <span class="calc-btn op">&divide;</span>

        <span class="calc-btn">7</span>
        <span class="calc-btn">8</span>
        <span class="calc-btn">9</span>
        <span class="calc-btn op">&times;</span>

        <span class="calc-btn">4</span>
        <span class="calc-btn">5</span>
        <span class="calc-btn">6</span>
        <span class="calc-btn op">&minus;</span>

        <span class="calc-btn">1</span>
        <span class="calc-btn">2</span>
        <span class="calc-btn">3</span>
        <span class="calc-btn op">+</span>

        <span class="calc-btn zero">0</span>
        <span class="calc-btn">.</span>
        <span class="calc-btn equals">=</span>
      </div>
    </div>
  </div>
</body>
</html>

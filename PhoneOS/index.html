<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhoneOS</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="phone-frame">
    <div class="phone-screen">
      <div class="notch"></div>

      <div class="status-bar">
        <span>9:41</span>
        <div class="status-icons">
          <span>&#128246;</span>
          <span>&#128267; 100%</span>
        </div>
      </div>

      <div class="home-content">
        <div class="home-heading">LETS GO GIRL</div>
        <div class="home-time">9:41</div>
        <div class="home-date">Saturday, July 4</div>

        <div class="app-grid">
          <a class="app-icon-link" href="camera.html">
            <div class="app-icon icon-camera">&#128247;</div>
            <span class="app-label">Camera</span>
          </a>
          <a class="app-icon-link" href="gallery.html">
            <div class="app-icon icon-gallery">&#128444;&#65039;</div>
            <span class="app-label">Gallery</span>
          </a>
          <a class="app-icon-link" href="notes.html">
            <div class="app-icon icon-notes">&#128221;</div>
            <span class="app-label">Notes</span>
          </a>

          <a class="app-icon-link" href="messages.html">
            <div class="app-icon icon-messages">&#128172;</div>
            <span class="app-label">Messages</span>
          </a>
          <a class="app-icon-link" href="calculator.html">
            <div class="app-icon icon-calc">&#128290;</div>
            <span class="app-label">Calculator</span>
          </a>
          <a class="app-icon-link" href="settings.html">
            <div class="app-icon icon-settings">&#9881;&#65039;</div>
            <span class="app-label">Settings</span>
          </a>

          <a class="app-icon-link" href="phone.html">
            <div class="app-icon icon-phone">&#128222;</div>
            <span class="app-label">Phone</span>
          </a>
          <a class="app-icon-link" href="browser.html">
            <div class="app-icon icon-browser">&#127760;</div>
            <span class="app-label">Browser</span>
          </a>
          <a class="app-icon-link" href="music.html">
            <div class="app-icon icon-music">&#127925;</div>
            <span class="app-label">Music</span>
          </a>
        </div>
      </div>

      <div class="home-indicator"></div>
    </div>
  </div>
</body>
</html>

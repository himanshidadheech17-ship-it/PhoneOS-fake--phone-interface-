<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="phone-frame">
    <div class="phone-screen">
      <div class="notch"></div>

      <div class="app-header">
        <a class="back-btn" href="index.html">&#8592;</a>
        <span class="app-title">Messages</span>
      </div>

      <div class="app-body">
        <div class="chat-item">
          <div class="chat-avatar" style="background: linear-gradient(145deg,#ff9966,#ff5e62);">F</div>
          <div class="chat-meta">
            <div class="chat-name">Friend</div>
            <div class="chat-preview">Keep Going,you can do it!</div>
          </div>
          <div class="chat-time">9:40</div>
        </div>
        <div class="chat-item">
          <div class="chat-avatar" style="background: linear-gradient(145deg,#4fd8c4,#23a6a1);">M</div>
          <div class="chat-meta">
            <div class="chat-name">Mumma</div>
            <div class="chat-preview">Khane me kya khayagi</div>
          </div>
          <div class="chat-time">8:15</div>
        </div>
        <div class="chat-item">
          <div class="chat-avatar" style="background: linear-gradient(145deg,#f6d365,#d9a441);">H</div>
          <div class="chat-meta">
            <div class="chat-name">HOMIE</div>
            <div class="chat-preview">Vapas kab milenge yrr.Kile pa chale.</div>
          </div>
          <div class="chat-time">Today</div>
        </div>
        <div class="chat-item">
          <div class="chat-avatar" style="background: linear-gradient(145deg,#ff7c7c,#d94d5c);">P</div>
          <div class="chat-meta">
            <div class="chat-name">Papa</div>
            <div class="chat-preview">Kitne paise bheju beta?</div>
          </div>
          <div class="chat-time">Thursday</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browser</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="phone-frame">
    <div class="phone-screen">
      <div class="notch"></div>

      <div class="app-header">
        <a class="back-btn" href="index.html">&#8592;</a>
        <span class="app-title">Browser</span>
      </div>

      <div class="app-body">
        <div class="address-bar">&#128274; github.com</div>

        <div class="settings-section-label">Favorites</div>
        <div class="bookmarks-grid">
          <div class="bookmark-tile">
            <div class="bookmark-icon">&#128187;</div>
            GitHub
          </div>
          <div class="bookmark-tile">
            <div class="bookmark-icon">&#128202;</div>
            Kaggle
          </div>
          <div class="bookmark-tile">
            <div class="bookmark-icon">&#128100;</div>
            LinkedIn
          </div>
          <div class="bookmark-tile">
            <div class="bookmark-icon">&#128218;</div>
            Docs
          </div>
          <div class="bookmark-tile">
            <div class="bookmark-icon">&#128231;</div>
            Gmail
          </div>
          <div class="bookmark-tile">
            <div class="bookmark-icon">&#127909;</div>
            YouTube
          </div>
          <div class="bookmark-tile">
            <div class="bookmark-icon">&#128269;</div>
            Search
          </div>
          <div class="bookmark-tile">
            <div class="bookmark-icon">&#9881;&#65039;</div>
            More
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>

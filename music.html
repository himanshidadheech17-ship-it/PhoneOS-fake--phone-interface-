<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="phone-frame">
    <div class="phone-screen">
      <div class="notch"></div>

      <div class="app-header">
        <a class="back-btn" href="index.html">&#8592;</a>
        <span class="app-title">Now Playing</span>
      </div>

      <div class="app-body">
        <img class="album-art" src="https://commons.wikimedia.org/wiki/Special:FilePath/Lord_Hanuman_Ji.jpg" alt="Hanuman ji" />

        <div class="track-info">
          <div class="track-title">Bajrang Baan</div>
          <div class="track-artist">LoFi &middot; Rasraj Ji Maharaj</div>
        </div>

        <div class="progress-track">
          <div class="progress-fill"></div>
        </div>

        <div class="player-controls">
          <span>&#9198;</span>
          <span class="play-btn">&#9654;</span>
          <span>&#9197;</span>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
